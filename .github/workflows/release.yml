name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tag and derive Android version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v([0-9]{4})\.([0-9]{1,2})\.([0-9]{1,2})$ ]]; then
            echo "Tag '${tag}' is invalid. Expected format: v2026.0.3" >&2
            exit 1
          fi

          year="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          if (( minor > 99 || patch > 99 )); then
            echo "Minor and patch must be between 0 and 99" >&2
            exit 1
          fi

          version_name="${tag#v}"
          printf -v version_code "%d%02d%02d" "${year}" "${minor}" "${patch}"
          artifact_name="homeassistant-mobile-ble-proxy-${tag}-release.apk"

          {
            echo "version_name=${version_name}"
            echo "version_code=${version_code}"
            echo "artifact_name=${artifact_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate signing secrets
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          for key in \
            ANDROID_RELEASE_KEYSTORE_BASE64 \
            ANDROID_RELEASE_STORE_PASSWORD \
            ANDROID_RELEASE_KEY_ALIAS \
            ANDROID_RELEASE_KEY_PASSWORD
          do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required GitHub Actions secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Decode Android signing keystore
        id: signing
        shell: bash
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          keystore_path="${RUNNER_TEMP}/android-release.jks"
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"
          echo "keystore_path=${keystore_path}" >> "${GITHUB_OUTPUT}"

      - name: Build release APK
        env:
          ANDROID_RELEASE_STORE_FILE: ${{ steps.signing.outputs.keystore_path }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -PreleaseVersionName="${{ steps.version.outputs.version_name }}" \
            -PreleaseVersionCode="${{ steps.version.outputs.version_code }}"

      - name: Collect release artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail

          apk_path="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | sort | head -n 1)"
          if [[ -z "${apk_path}" ]]; then
            echo "No APK found under app/build/outputs/apk/release" >&2
            exit 1
          fi

          artifact_name="${{ steps.version.outputs.artifact_name }}"
          cp "${apk_path}" "${artifact_name}"
          sha256sum "${artifact_name}" > "${artifact_name}.sha256"

          {
            echo "apk_path=${artifact_name}"
            echo "checksum_path=${artifact_name}.sha256"
          } >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Android release build for `${{ github.ref_name }}`.

            - `versionName`: `${{ steps.version.outputs.version_name }}`
            - `versionCode`: `${{ steps.version.outputs.version_code }}`
            - `signing`: GitHub Actions keystore secrets
          files: |
            ${{ steps.artifacts.outputs.apk_path }}
            ${{ steps.artifacts.outputs.checksum_path }}
